<style>
  :root {
    --bg:      #122333;
    --surface: #1a2f42;
    --surface2:#1f3a50;
    --accent:  #4fc3f7;
    --accent2: #81d4fa;
    --correct: #4caf7d;
    --wrong:   #e05c6a;
    --text:    #e8f4fd;
    --muted:   #7aafc9;
    --border:  rgba(79,195,247,0.15);
    --radius:  16px;
    --rsm:     10px;
    /* JS will set this to the actual visible height */
    --app-height: 100vh;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  /* The app wrapper is sized to the visible area above the keyboard */
  #app {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--app-height);
    display: flex;
    flex-direction: column;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    color: var(--text);
    overflow: hidden;
    transition: height 0.05s;
  }

    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(79,195,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ── TOP AREA ── */
  #top-area {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 16px 0;
    position: relative;
    z-index: 1;
  }

  .card {
    width: 100%;
    max-width: 600px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  #status-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    letter-spacing: 0.05em;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #flag-container {
    width: 100%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    /* Takes up to 55% of the card height */
    max-height: 55%;
  }

  #flag-img {
    max-width: 100%;
    max-height: 100%;
    width: auto; height: auto;
    border-radius: 5px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
    opacity: 0;
    transition: opacity 0.4s ease;
    object-fit: contain;
    display: block;
  }
  #flag-img.loaded { opacity: 1; }

  #question-area {
    flex: 1;
    min-height: 0;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  #question-text {
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    font-weight: 400;
    line-height: 1.3;
  }

  /* ── BOTTOM PANEL ── */
  #bottom-panel {
    flex-shrink: 0;
    width: 100%;
    max-width: 600px;
    align-self: center;
    z-index: 10;
    background: var(--bg);
    border-top: 1px solid var(--border);
    box-shadow: 0 -6px 24px rgba(0,0,0,0.3);
    padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 7px;
  }

  #result-strip {
    display: none;
    border-radius: var(--rsm);
    overflow: hidden;
    animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1);
  }
  #result-strip.show { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #result-header {
    padding: 9px 12px;
    display: flex; align-items: center; gap: 10px;
  }
  #result-header.correct-bg {
    background: rgba(76,175,125,0.15);
    border-bottom: 1px solid rgba(76,175,125,0.2);
  }
  #result-header.wrong-bg {
    background: rgba(224,92,106,0.15);
    border-bottom: 1px solid rgba(224,92,106,0.2);
  }

  .result-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; flex-shrink: 0;
  }
  .result-icon.correct-icon { background: rgba(76,175,125,0.25); }
  .result-icon.wrong-icon   { background: rgba(224,92,106,0.25); }

  #result-verdict { font-size: 0.9rem; font-weight: 500; }
  #result-verdict.correct-text { color: var(--correct); }
  #result-verdict.wrong-text   { color: var(--wrong); }
  #correct-answer-line { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

  #result-info {
    padding: 7px 12px 8px;
    font-size: 0.78rem; line-height: 1.45;
    color: var(--muted);
    background: var(--surface);
  }

  #answer-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--rsm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 300;
    /* Reduced height */
    padding: 7px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  #answer-input::placeholder { color: var(--muted); }
  #answer-input:focus {
    border-color: rgba(79,195,247,0.5);
    box-shadow: 0 0 0 3px rgba(79,195,247,0.08);
  }
  #answer-input.correct {
    border-color: var(--correct);
    box-shadow: 0 0 0 3px rgba(76,175,125,0.12);
    color: var(--correct);
  }
  #answer-input.wrong {
    border-color: var(--wrong);
    box-shadow: 0 0 0 3px rgba(224,92,106,0.12);
    color: var(--wrong);
  }

  #next-btn {
    display: none;
    width: 100%;
    background: transparent; color: var(--accent);
    border: 1px solid rgba(79,195,247,0.3); border-radius: var(--rsm);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 400; letter-spacing: 0.06em;
    padding: 10px; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    -webkit-appearance: none;
  }
  #next-btn.show { display: block; }
  #next-btn:hover { background: rgba(79,195,247,0.07); border-color: rgba(79,195,247,0.6); }
  #next-btn:active { transform: scale(0.98); }
</style>
</head>
<body>

<div id="app">

  <div id="top-area">
    <div class="card">
      <div id="status-screen">
        <div class="spinner"></div>
        Loading questions…
      </div>
      <div id="flag-container" style="display:none">
        <img id="flag-img" src="" alt="Flag" />
      </div>
      <div id="question-area" style="display:none">
        <div id="question-text"></div>
      </div>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="result-strip">
      <div id="result-header">
        <div class="result-icon" id="result-icon"></div>
        <div>
          <div id="result-verdict"></div>
          <div id="correct-answer-line"></div>
        </div>
      </div>
      <div id="result-info"></div>
    </div>
    <input
      type="text" id="answer-input"
      placeholder="Type your answer…"
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false"
    />
    <button id="next-btn">Next Question →</button>
  </div>

</div>

<script>
const SHEET_ID = '1ag_F_Klj_Ej12EbGzKWk0850g7cUja8H5u1VKireffE';
const GID      = '1247614761';
const RECENCY  = 10;
const POLL_MS  = 30000;

let questions    = [];
let current      = null;
let recentIds    = [];
let answered     = false;
let scoreCorrect = 0;
let scoreWrong   = 0;

// ── RESIZE: set --app-height to the actual visible area ──────────────────────
// On iOS, window.visualViewport tracks the area above the keyboard
function setAppHeight() {
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--app-height', h + 'px');
  // Also reposition #app to account for any viewport offset (iOS scrolls the viewport)
  const offsetY = window.visualViewport ? window.visualViewport.offsetTop : 0;
  document.getElementById('app').style.top = offsetY + 'px';
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', setAppHeight);
  window.visualViewport.addEventListener('scroll', setAppHeight);
}
window.addEventListener('resize', setAppHeight);
setAppHeight();

// ── HELPERS ──────────────────────────────────────────────────────────────────
function normalise(str) {
  return str.toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ');
}

function toWikimediaUrl(url) {
  if (!url) return '';
  if (url.includes('Special:FilePath')) return url;
  const m = url.match(/\/commons\/(?:thumb\/)?[a-f0-9]\/[a-f0-9]{2}\/([^/]+?)(?:\/\d+px-.+)?$/);
  return m ? `https://commons.wikimedia.org/wiki/Special:FilePath/${m[1]}` : url;
}

// ── FETCH & PARSE ────────────────────────────────────────────────────────────
async function fetchSheet() {
  const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`);
  if (!res.ok) throw new Error('Failed to fetch sheet');
  return parseCSV(await res.text());
}

function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length) {
      if (text[i] === '"') {
        let f = ''; i++;
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { f += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else f += text[i++];
        }
        row.push(f);
        if (text[i] === ',') i++;
        else { if (text[i]==='\r') i++; if (text[i]==='\n') i++; break; }
      } else {
        let f = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r') f += text[i++];
        row.push(f.trim());
        if (text[i] === ',') i++;
        else { if (text[i]==='\r') i++; if (text[i]==='\n') i++; break; }
      }
    }
    if (row.some(c => c !== '')) rows.push(row);
  }
  const start = (rows[0] && normalise(rows[0][4]).startsWith('capital')) ? 1 : 0;
  return rows.slice(start).map((r, idx) => {
    const answers = [];
    for (let c = 7; c <= 16; c++) if (r[c]?.trim()) answers.push(r[c].trim());
    return {
      id:       idx,
      question: (r[4]||'').trim(),
      image:    toWikimediaUrl((r[5]||'').trim()),
      weight:   parseInt(r[6])||0,
      answers,
      info:     (r[17]||'').trim(),
    };
  }).filter(q => q.question && q.weight > 0 && q.answers.length > 0);
}

// ── PICK ─────────────────────────────────────────────────────────────────────
function pickQuestion() {
  const pool = questions.filter(q => !recentIds.includes(q.id));
  const src = pool.length ? pool : questions;
  const total = src.reduce((s,q) => s+q.weight, 0);
  let r = Math.random() * total;
  for (const q of src) { r -= q.weight; if (r <= 0) return q; }
  return src[src.length-1];
}

// ── SHOW ─────────────────────────────────────────────────────────────────────
function showQuestion(q) {
  current  = q;
  answered = false;
  recentIds.push(q.id);
  if (recentIds.length > RECENCY) recentIds.shift();

  document.getElementById('status-screen').style.display = 'none';

  const flagContainer = document.getElementById('flag-container');
  const flagImg = document.getElementById('flag-img');
  if (q.image) {
    flagImg.classList.remove('loaded');
    flagImg.src = '';
    flagContainer.style.display = 'flex';
    flagImg.onload  = () => flagImg.classList.add('loaded');
    flagImg.onerror = () => { flagContainer.style.display = 'none'; };
    flagImg.src = q.image;
  } else {
    flagContainer.style.display = 'none';
  }

  document.getElementById('question-area').style.display = 'flex';
  document.getElementById('question-text').textContent = q.question;

  const input = document.getElementById('answer-input');
  input.value = ''; input.className = '';
  input.disabled = false;

  document.getElementById('result-strip').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');

  // Re-measure visible height in case keyboard state changed
  setAppHeight();

  input.focus();
}

// ── CHECK ─────────────────────────────────────────────────────────────────────
function checkAnswer() {
  if (answered || !current) return;
  answered = true;

  const input = document.getElementById('answer-input');
  const isCorrect = current.answers.some(a => normalise(a) === normalise(input.value));

  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.disabled = true;

  if (isCorrect) scoreCorrect++; else scoreWrong++;

  const header     = document.getElementById('result-header');
  const icon       = document.getElementById('result-icon');
  const verdict    = document.getElementById('result-verdict');
  const answerLine = document.getElementById('correct-answer-line');
  const infoEl     = document.getElementById('result-info');

  if (isCorrect) {
    header.className       = 'correct-bg';
    icon.className         = 'result-icon correct-icon';
    icon.textContent       = '✓';
    verdict.className      = 'correct-text';
    verdict.textContent    = 'Correct!';
    answerLine.textContent = '';
  } else {
    header.className       = 'wrong-bg';
    icon.className         = 'result-icon wrong-icon';
    icon.textContent       = '✗';
    verdict.className      = 'wrong-text';
    verdict.textContent    = 'Not quite.';
    answerLine.textContent = `Answer: ${current.answers[0]}`;
  }

  infoEl.textContent   = current.info || '';
  infoEl.style.display = current.info ? 'block' : 'none';

  document.getElementById('result-strip').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function loadAndStart() {
  try {
    questions = await fetchSheet();
    if (!questions.length) throw new Error('No questions found');
    showQuestion(pickQuestion());
  } catch(e) {
    document.getElementById('status-screen').innerHTML =
      `<div style="color:var(--wrong)">⚠ Could not load questions.<br><small>${e.message}</small></div>`;
  }
}

setInterval(async () => {
  try { const u = await fetchSheet(); if (u.length) questions = u; } catch(_) {}
}, POLL_MS);

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (!answered) {
    if (document.getElementById('answer-input').value.trim() !== '') checkAnswer();
  } else {
    showQuestion(pickQuestion());
  }
});

document.getElementById('next-btn').addEventListener('click', () => showQuestion(pickQuestion()));

loadAndStart();
</script>
</body>
</html>
