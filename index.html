<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #122333;
    --surface: #1a2f42;
    --surface2: #1f3a50;
    --accent: #4fc3f7;
    --accent2: #81d4fa;
    --correct: #4caf7d;
    --wrong: #e05c6a;
    --text: #e8f4fd;
    --text-muted: #7aafc9;
    --border: rgba(79,195,247,0.15);
    --radius: 16px;
    --radius-sm: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 0;
  }

  /* Subtle grid texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,195,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blob */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(79,195,247,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── MAIN CARD ── */
  main {
    width: 100%;
    max-width: 640px;
    padding: 32px 16px 40px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all 0.3s ease;
  }

  /* ── LOADING / ERROR ── */
  #status-screen {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.95rem;
    letter-spacing: 0.05em;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FLAG IMAGE ── */
  #flag-container {
    width: 100%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    border-bottom: 1px solid var(--border);
    min-height: 140px;
  }

  #flag-img {
    max-width: 240px;
    max-height: 160px;
    width: auto;
    height: auto;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
    display: block;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #flag-img.loaded { opacity: 1; }

  /* ── QUESTION ── */
  #question-area {
    padding: 28px 28px 24px;
  }

  #question-text {
    font-size: clamp(1.25rem, 4vw, 1.55rem);
    font-weight: 400;
    line-height: 1.35;
    color: var(--text);
  }

  /* ── ANSWER INPUT ── */
  #answer-area {
    padding: 0 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #answer-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 300;
    padding: 16px 18px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  #answer-input::placeholder { color: var(--text-muted); }

  #answer-input:focus {
    border-color: rgba(79,195,247,0.5);
    box-shadow: 0 0 0 3px rgba(79,195,247,0.08);
  }

  #answer-input.correct {
    border-color: var(--correct);
    box-shadow: 0 0 0 3px rgba(76,175,125,0.12);
    color: var(--correct);
  }

  #answer-input.wrong {
    border-color: var(--wrong);
    box-shadow: 0 0 0 3px rgba(224,92,106,0.12);
    color: var(--wrong);
  }

  /* ── SUBMIT BUTTON ── */
  #submit-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 17px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  #submit-btn:hover {
    background: var(--accent2);
    box-shadow: 0 4px 20px rgba(79,195,247,0.25);
  }

  #submit-btn:active { transform: scale(0.98); }

  #submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* ── RESULT CARD ── */
  #result-card {
    display: none;
    border-radius: var(--radius);
    overflow: hidden;
    animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #result-card.show { display: block; }

  #result-header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  #result-header.correct-bg { background: rgba(76,175,125,0.12); border-bottom: 1px solid rgba(76,175,125,0.2); }
  #result-header.wrong-bg   { background: rgba(224,92,106,0.12); border-bottom: 1px solid rgba(224,92,106,0.2); }

  .result-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .result-icon.correct-icon { background: rgba(76,175,125,0.2); }
  .result-icon.wrong-icon   { background: rgba(224,92,106,0.2); }

  #result-verdict {
    font-size: 1.1rem;
    font-weight: 500;
  }

  #result-verdict.correct-text { color: var(--correct); }
  #result-verdict.wrong-text   { color: var(--wrong); }

  #correct-answer-line {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 3px;
  }

  #result-info {
    padding: 16px 24px 18px;
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--text-muted);
    border-top: none;
  }

  /* ── NEXT BUTTON ── */
  #next-btn {
    width: 100%;
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(79,195,247,0.3);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    padding: 17px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    display: none;
    -webkit-appearance: none;
  }

  #next-btn.show { display: block; }

  #next-btn:hover {
    background: rgba(79,195,247,0.07);
    border-color: rgba(79,195,247,0.6);
    box-shadow: 0 0 20px rgba(79,195,247,0.08);
  }

  #next-btn:active { transform: scale(0.98); }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    header { padding: 24px 16px 0; }

    #question-area { padding: 22px 20px 18px; }
    #answer-area   { padding: 0 20px 22px; }

    #answer-input  { padding: 18px 16px; font-size: 1rem; }
    #submit-btn    { padding: 19px; font-size: 1rem; }
    #next-btn      { padding: 19px; font-size: 1rem; }

    #result-header { padding: 18px 20px 14px; }
    #result-info   { padding: 14px 20px 16px; }
  }
</style>
</head>
<body>

<main>  <!-- Main question card -->
  <div class="card" id="question-card">
    <div id="status-screen">
      <div class="spinner"></div>
      Loading questions…
    </div>

    <div id="flag-container" style="display:none">
      <img id="flag-img" src="" alt="Visual prompt" />
    </div>

    <div id="question-area" style="display:none">
      <div id="question-text"></div>
    </div>

    <div id="answer-area" style="display:none">
      <input
        type="text"
        id="answer-input"
        placeholder="Type your answer…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <button id="submit-btn" disabled>Submit</button>
    </div>
  </div>

  <!-- Result card (shown after answer) -->
  <div class="card" id="result-card">
    <div id="result-header">
      <div class="result-icon" id="result-icon"></div>
      <div>
        <div id="result-verdict"></div>
        <div id="correct-answer-line"></div>
      </div>
    </div>
    <div id="result-info"></div>
  </div>

  <!-- Next question button -->
  <button id="next-btn">Next Question →</button>

</main>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID  = '1ag_F_Klj_Ej12EbGzKWk0850g7cUja8H5u1VKireffE';
const GID       = '1247614761';
const RECENCY   = 10;   // How many recent questions to suppress
const POLL_MS   = 30000; // Re-fetch sheet data every 30 seconds

// ── STATE ────────────────────────────────────────────────────────────────────
let questions    = [];
let current      = null;
let recentIds    = [];
let answered     = false;
let scoreCorrect = 0;
let scoreWrong   = 0;

// ── NORMALISE for comparison ─────────────────────────────────────────────────
function normalise(str) {
  return str
    .toLowerCase()
    .trim()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '') // strip diacritics
    .replace(/\s+/g, ' ');
}

// ── CONVERT flag URL to supported Wikimedia FilePath format ─────────────────
function toWikimediaUrl(url) {
  if (!url) return '';
  // Already in FilePath format
  if (url.includes('Special:FilePath')) return url;
  // Extract filename from thumb URL e.g. /commons/thumb/a/ab/Flag_of_X.svg/320px-Flag_of_X.svg.png
  const match = url.match(/\/commons\/(?:thumb\/)?[a-f0-9]\/[a-f0-9]{2}\/([^/]+?)(?:\/\d+px-.+)?$/);
  if (match) {
    return `https://commons.wikimedia.org/wiki/Special:FilePath/${match[1]}`;
  }
  return url; // fallback: return as-is
}

// ── FETCH SHEET DATA ─────────────────────────────────────────────────────────
async function fetchSheet() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error('Failed to fetch sheet');
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const rows = [];
  let i = 0;

  while (i < text.length) {
    const row = [];
    while (i < text.length) {
      if (text[i] === '"') {
        // quoted field
        let field = '';
        i++; // skip opening quote
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { field += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { field += text[i++]; }
        }
        row.push(field);
        if (text[i] === ',') i++;
        else if (text[i] === '\r') i++;
        else if (text[i] === '\n') { i++; break; }
        else if (i >= text.length) break;
      } else {
        let field = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r') {
          field += text[i++];
        }
        row.push(field.trim());
        if (text[i] === ',') i++;
        else if (text[i] === '\r') i++;
        else if (text[i] === '\n') { i++; break; }
        else if (i >= text.length) break;
      }
    }
    // skip \n after \r
    if (text[i] === '\n') i++;
    if (row.length > 0 && row.some(c => c !== '')) rows.push(row);
  }

  // Parse into question objects (skip header row if present)
  const start = (rows[0] && normalise(rows[0][0]).startsWith('question')) ? 1 : 0;

  return rows.slice(start).map((r, idx) => {
    const answers = [];
    for (let c = 3; c <= 12; c++) {
      if (r[c] && r[c].trim()) answers.push(r[c].trim());
    }
    return {
      id:       idx,
      question: (r[0] || '').trim(),
      image:    toWikimediaUrl((r[1] || '').trim()),
      weight:   parseInt(r[2]) || 0,
      answers,
      info:     (r[13] || '').trim(),
    };
  }).filter(q => q.question && q.weight > 0 && q.answers.length > 0);
}

// ── WEIGHTED RANDOM PICK ─────────────────────────────────────────────────────
function pickQuestion() {
  const pool = questions.filter(q => !recentIds.includes(q.id));
  if (!pool.length) return questions[Math.floor(Math.random() * questions.length)];

  const total = pool.reduce((s, q) => s + q.weight, 0);
  let r = Math.random() * total;
  for (const q of pool) {
    r -= q.weight;
    if (r <= 0) return q;
  }
  return pool[pool.length - 1];
}

// ── RENDER QUESTION ──────────────────────────────────────────────────────────
function showQuestion(q) {
  current  = q;
  answered = false;

  // Track recency
  recentIds.push(q.id);
  if (recentIds.length > RECENCY) recentIds.shift();

  // Hide status screen
  document.getElementById('status-screen').style.display = 'none';

  // Flag image
  const flagContainer = document.getElementById('flag-container');
  const flagImg       = document.getElementById('flag-img');
  if (q.image) {
    flagImg.classList.remove('loaded');
    flagImg.src     = '';
    flagContainer.style.display = 'flex';
    flagImg.onload  = () => flagImg.classList.add('loaded');
    flagImg.onerror = () => { flagContainer.style.display = 'none'; };
    flagImg.src     = q.image;
  } else {
    flagContainer.style.display = 'none';
  }

  // Question text
  const qArea = document.getElementById('question-area');
  qArea.style.display = 'block';
  document.getElementById('question-text').textContent = q.question;

  // Answer area
  const aArea = document.getElementById('answer-area');
  aArea.style.display = 'flex';
  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = '';
  input.disabled  = false;
  input.focus();

  const btn = document.getElementById('submit-btn');
  btn.disabled    = true;
  btn.textContent = 'Submit';

  // Hide result + next
  const resultCard = document.getElementById('result-card');
  resultCard.classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
}

// ── CHECK ANSWER ─────────────────────────────────────────────────────────────
function checkAnswer() {
  if (answered || !current) return;
  answered = true;

  const input    = document.getElementById('answer-input');
  const userAns  = input.value;
  const normUser = normalise(userAns);

  const isCorrect = current.answers.some(a => normalise(a) === normUser);

  // Style input
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.disabled = true;
  document.getElementById('submit-btn').disabled = true;

  // Update score
  if (isCorrect) scoreCorrect++; else scoreWrong++;

  // Result card
  const resultCard   = document.getElementById('result-card');
  const header       = document.getElementById('result-header');
  const icon         = document.getElementById('result-icon');
  const verdict      = document.getElementById('result-verdict');
  const answerLine   = document.getElementById('correct-answer-line');
  const infoEl       = document.getElementById('result-info');

  if (isCorrect) {
    header.className  = 'correct-bg';
    icon.className    = 'result-icon correct-icon';
    icon.textContent  = '✓';
    verdict.className = 'correct-text';
    verdict.textContent = 'Correct!';
    answerLine.textContent = '';
  } else {
    header.className  = 'wrong-bg';
    icon.className    = 'result-icon wrong-icon';
    icon.textContent  = '✗';
    verdict.className = 'wrong-text';
    verdict.textContent = 'Not quite.';
    answerLine.textContent = `Answer: ${current.answers[0]}`;
  }

  infoEl.textContent = current.info || '';
  infoEl.style.display = current.info ? 'block' : 'none';

  resultCard.classList.add('show');
  document.getElementById('next-btn').classList.add('show');
}

// ── INIT & POLL ──────────────────────────────────────────────────────────────
async function loadAndStart() {
  try {
    questions = await fetchSheet();
    if (!questions.length) throw new Error('No questions found');
    showQuestion(pickQuestion());
  } catch(e) {
    document.getElementById('status-screen').innerHTML =
      `<div style="color:var(--wrong)">⚠ Could not load questions.<br><small>${e.message}</small></div>`;
  }
}

// Poll for sheet updates without interrupting current question
setInterval(async () => {
  try {
    const updated = await fetchSheet();
    if (updated.length) questions = updated;
  } catch(_) {}
}, POLL_MS);

// ── EVENTS ───────────────────────────────────────────────────────────────────
document.getElementById('answer-input').addEventListener('input', function() {
  document.getElementById('submit-btn').disabled = this.value.trim() === '';
});

// Single Enter key handler covering both phases:
// Phase 1 (not yet answered): submit the answer
// Phase 2 (answered):         go to next question
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (!answered) {
    // Only submit if there's something typed
    if (document.getElementById('answer-input').value.trim() !== '') {
      checkAnswer();
    }
  } else {
    showQuestion(pickQuestion());
  }
});

document.getElementById('submit-btn').addEventListener('click', checkAnswer);

document.getElementById('next-btn').addEventListener('click', () => {
  showQuestion(pickQuestion());
});

// ── START ────────────────────────────────────────────────────────────────────
loadAndStart();
</script>
</body>
</html>
