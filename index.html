<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #122333;
    --surface:  #1a2f42;
    --surface2: #1f3a50;
    --accent:   #4fc3f7;
    --accent2:  #81d4fa;
    --correct:  #4caf7d;
    --wrong:    #e05c6a;
    --text:     #e8f4fd;
    --muted:    #7aafc9;
    --border:   rgba(79,195,247,0.15);
    --radius:   16px;
    --rsm:      10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding-bottom: 260px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(79,195,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(79,195,247,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── TOP AREA ── */
  #top-area {
    width: 100%;
    max-width: 640px;
    padding: 32px 16px 16px;
    position: relative;
    z-index: 1;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  #status-screen {
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
    letter-spacing: 0.05em;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #flag-container {
    width: 100%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    padding: 28px;
    border-bottom: 1px solid var(--border);
    min-height: 140px;
  }

  #flag-img {
    max-width: 240px; max-height: 160px;
    width: auto; height: auto;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.08);
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #flag-img.loaded { opacity: 1; }

  #question-area { padding: 28px; }

  #question-text {
    font-size: clamp(1.25rem, 4vw, 1.55rem);
    font-weight: 400;
    line-height: 1.35;
  }

  /* ── FIXED BOTTOM PANEL ── */
  #bottom-panel {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 640px;
    z-index: 10;
    background: var(--bg);
    border-top: 1px solid var(--border);
    box-shadow: 0 -8px 32px rgba(0,0,0,0.35);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 10px;
  }

  /* result strip */
  #result-strip {
    display: none;
    border-radius: var(--rsm);
    overflow: hidden;
    animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  #result-strip.show { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #result-header {
    padding: 13px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  #result-header.correct-bg {
    background: rgba(76,175,125,0.15);
    border-bottom: 1px solid rgba(76,175,125,0.2);
  }
  #result-header.wrong-bg {
    background: rgba(224,92,106,0.15);
    border-bottom: 1px solid rgba(224,92,106,0.2);
  }

  .result-icon {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }
  .result-icon.correct-icon { background: rgba(76,175,125,0.25); }
  .result-icon.wrong-icon   { background: rgba(224,92,106,0.25); }

  #result-verdict { font-size: 1rem; font-weight: 500; }
  #result-verdict.correct-text { color: var(--correct); }
  #result-verdict.wrong-text   { color: var(--wrong); }

  #correct-answer-line { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  #result-info {
    padding: 10px 16px 12px;
    font-size: 0.85rem; line-height: 1.55;
    color: var(--muted);
    background: var(--surface);
  }

  /* answer input */
  #answer-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--rsm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 300;
    padding: 15px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  #answer-input::placeholder { color: var(--muted); }
  #answer-input:focus {
    border-color: rgba(79,195,247,0.5);
    box-shadow: 0 0 0 3px rgba(79,195,247,0.08);
  }
  #answer-input.correct {
    border-color: var(--correct);
    box-shadow: 0 0 0 3px rgba(76,175,125,0.12);
    color: var(--correct);
  }
  #answer-input.wrong {
    border-color: var(--wrong);
    box-shadow: 0 0 0 3px rgba(224,92,106,0.12);
    color: var(--wrong);
  }

  /* submit */
  #submit-btn {
    width: 100%;
    background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--rsm);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 500; letter-spacing: 0.06em;
    padding: 17px; cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  #submit-btn:hover { background: var(--accent2); box-shadow: 0 4px 20px rgba(79,195,247,0.25); }
  #submit-btn:active { transform: scale(0.98); }
  #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* next */
  #next-btn {
    display: none;
    width: 100%;
    background: transparent; color: var(--accent);
    border: 1px solid rgba(79,195,247,0.3); border-radius: var(--rsm);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 400; letter-spacing: 0.06em;
    padding: 17px; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    -webkit-appearance: none;
  }
  #next-btn.show { display: block; }
  #next-btn:hover { background: rgba(79,195,247,0.07); border-color: rgba(79,195,247,0.6); }
  #next-btn:active { transform: scale(0.98); }
</style>
</head>
<body>

<div id="top-area">
  <div class="card">

    <div id="status-screen">
      <div class="spinner"></div>
      Loading questions…
    </div>

    <div id="flag-container" style="display:none">
      <img id="flag-img" src="" alt="Flag" />
    </div>

    <div id="question-area" style="display:none">
      <div id="question-text"></div>
    </div>

  </div>
</div>

<div id="bottom-panel">

  <div id="result-strip">
    <div id="result-header">
      <div class="result-icon" id="result-icon"></div>
      <div>
        <div id="result-verdict"></div>
        <div id="correct-answer-line"></div>
      </div>
    </div>
    <div id="result-info"></div>
  </div>

  <input
    type="text" id="answer-input"
    placeholder="Type your answer…"
    autocomplete="off" autocorrect="off"
    autocapitalize="off" spellcheck="false"
  />

  <button id="submit-btn" disabled>Submit</button>
  <button id="next-btn">Next Question →</button>

</div>

<script>
const SHEET_ID = '1ag_F_Klj_Ej12EbGzKWk0850g7cUja8H5u1VKireffE';
const GID      = '1247614761';
const RECENCY  = 10;
const POLL_MS  = 30000;

let questions    = [];
let current      = null;
let recentIds    = [];
let answered     = false;
let scoreCorrect = 0;
let scoreWrong   = 0;

function normalise(str) {
  return str.toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ');
}

function toWikimediaUrl(url) {
  if (!url) return '';
  if (url.includes('Special:FilePath')) return url;
  const m = url.match(/\/commons\/(?:thumb\/)?[a-f0-9]\/[a-f0-9]{2}\/([^/]+?)(?:\/\d+px-.+)?$/);
  return m ? `https://commons.wikimedia.org/wiki/Special:FilePath/${m[1]}` : url;
}

async function fetchSheet() {
  const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`);
  if (!res.ok) throw new Error('Failed to fetch sheet');
  return parseCSV(await res.text());
}

function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length) {
      if (text[i] === '"') {
        let f = ''; i++;
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { f += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else f += text[i++];
        }
        row.push(f);
        if (text[i] === ',') i++;
        else { if (text[i] === '\r') i++; if (text[i] === '\n') i++; break; }
      } else {
        let f = '';
        while (i < text.length && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r') f += text[i++];
        row.push(f.trim());
        if (text[i] === ',') i++;
        else { if (text[i] === '\r') i++; if (text[i] === '\n') i++; break; }
      }
    }
    if (row.some(c => c !== '')) rows.push(row);
  }
  const start = (rows[0] && normalise(rows[0][0]).startsWith('question')) ? 1 : 0;
  return rows.slice(start).map((r, idx) => {
    const answers = [];
    for (let c = 3; c <= 12; c++) if (r[c]?.trim()) answers.push(r[c].trim());
    return {
      id: idx,
      question: (r[0]||'').trim(),
      image: toWikimediaUrl((r[1]||'').trim()),
      weight: parseInt(r[2])||0,
      answers,
      info: (r[13]||'').trim(),
    };
  }).filter(q => q.question && q.weight > 0 && q.answers.length > 0);
}

function pickQuestion() {
  const pool = questions.filter(q => !recentIds.includes(q.id));
  const src = pool.length ? pool : questions;
  const total = src.reduce((s,q) => s+q.weight, 0);
  let r = Math.random() * total;
  for (const q of src) { r -= q.weight; if (r <= 0) return q; }
  return src[src.length-1];
}

function showQuestion(q) {
  current  = q;
  answered = false;
  recentIds.push(q.id);
  if (recentIds.length > RECENCY) recentIds.shift();

  document.getElementById('status-screen').style.display = 'none';

  const flagContainer = document.getElementById('flag-container');
  const flagImg = document.getElementById('flag-img');
  if (q.image) {
    flagImg.classList.remove('loaded');
    flagImg.src = '';
    flagContainer.style.display = 'flex';
    flagImg.onload  = () => flagImg.classList.add('loaded');
    flagImg.onerror = () => { flagContainer.style.display = 'none'; };
    flagImg.src = q.image;
  } else {
    flagContainer.style.display = 'none';
  }

  document.getElementById('question-area').style.display = 'block';
  document.getElementById('question-text').textContent = q.question;

  const input = document.getElementById('answer-input');
  input.value = ''; input.className = '';
  input.disabled = false; input.style.display = 'block';
  input.focus();

  const sb = document.getElementById('submit-btn');
  sb.disabled = true; sb.style.display = 'block';

  document.getElementById('result-strip').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
}

function checkAnswer() {
  if (answered || !current) return;
  answered = true;

  const input = document.getElementById('answer-input');
  const isCorrect = current.answers.some(a => normalise(a) === normalise(input.value));

  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.disabled = true;
  document.getElementById('submit-btn').style.display = 'none';

  if (isCorrect) scoreCorrect++; else scoreWrong++;

  const header     = document.getElementById('result-header');
  const icon       = document.getElementById('result-icon');
  const verdict    = document.getElementById('result-verdict');
  const answerLine = document.getElementById('correct-answer-line');
  const infoEl     = document.getElementById('result-info');

  if (isCorrect) {
    header.className = 'correct-bg';
    icon.className   = 'result-icon correct-icon';
    icon.textContent = '✓';
    verdict.className   = 'correct-text';
    verdict.textContent = 'Correct!';
    answerLine.textContent = '';
  } else {
    header.className = 'wrong-bg';
    icon.className   = 'result-icon wrong-icon';
    icon.textContent = '✗';
    verdict.className   = 'wrong-text';
    verdict.textContent = 'Not quite.';
    answerLine.textContent = `Answer: ${current.answers[0]}`;
  }

  infoEl.textContent   = current.info || '';
  infoEl.style.display = current.info ? 'block' : 'none';

  document.getElementById('result-strip').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
}

async function loadAndStart() {
  try {
    questions = await fetchSheet();
    if (!questions.length) throw new Error('No questions found');
    showQuestion(pickQuestion());
  } catch(e) {
    document.getElementById('status-screen').innerHTML =
      `<div style="color:var(--wrong)">⚠ Could not load questions.<br><small>${e.message}</small></div>`;
  }
}

setInterval(async () => {
  try { const u = await fetchSheet(); if (u.length) questions = u; } catch(_) {}
}, POLL_MS);

document.getElementById('answer-input').addEventListener('input', function() {
  document.getElementById('submit-btn').disabled = this.value.trim() === '';
});

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (!answered) {
    if (document.getElementById('answer-input').value.trim() !== '') checkAnswer();
  } else {
    showQuestion(pickQuestion());
  }
});

document.getElementById('submit-btn').addEventListener('click', checkAnswer);
document.getElementById('next-btn').addEventListener('click', () => showQuestion(pickQuestion()));

loadAndStart();
</script>
</body>
</html>
